preconnect:
  - https://gcore.jsdelivr.net
  - https://unpkg.com
  - https://cdn.bootcdn.net

inject:
  head:
    - <link rel="apple-touch-icon" sizes="180x180" href="/assets/head_photo.png">
    - <link rel="icon" type="image/png" sizes="32x32" href="/assets/head_photo.png">
    - <link rel="icon" type="image/png" sizes="16x16" href="/assets/head_photo.png">
    - <link rel="manifest" href="/assets/xaoxuu/favicon/site.webmanifest">
    - <link rel="shortcut icon" href="/assets/icon.png">
    - <meta name="theme-color" content="#f8f8f8">
    - <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/lxgw-wenkai-screen-webfont/1.7.0/style.min.css" media="all" />
    - <link rel="stylesheet" href="/css/custom.css">

logo:
  icon: /assets/head_photo.png
  title: 晴天
  subtitle: "天高云淡，蓝得发亮。 | Cloudless Day"

# 评论插件
comments:
  service: twikoo
  twikoo:
    envId: https://twikoo.yiviwwuo.top

menubar:
  items:
    - id: post
      theme: "#1BCDFC"
      icon: streamline-ultimate-color:book-close-bookmark-1
      title: 博客
      url: /
    # - id: topic
    #   theme: "#3DC550"
    #   icon: solar:notebook-bookmark-bold-duotone
    #   title: 项目
    #   url: /wiki/
    # - id: explore
    #   theme: "#FA6400"
    #   icon: solar:planet-bold-duotone
    #   title: 探索
    #   url: /explore/
    - id: life
      theme: "#FA6400"
      icon: streamline-ultimate-color:gymnastics-ribbon-person-2
      title: 生活
      url: /life/
    - id: social
      theme: "#F44336"
      icon: streamline-ultimate-color:business-deal-handshake-1
      title: 社交
      url: /friends/

site_tree:
  home:
    sidebar: starter, welcome, recent
  index_blog:
    sidebar: starter, welcome, recent
  index_topic:
    menu_id: topic
  topic:
    menu_id: topic

article:
  share: [wechat, weibo, email, link]

style:
  text-align: justify
  smooth_scroll: false
  codeblock:
    scrollbar: 0px
  font-size:
    body: 1rem
  font-family:
    logo: '"LXGW WenKai Screen", system-ui, "Microsoft Yahei", "Segoe UI", -apple-system, Roboto, Ubuntu, "Helvetica Neue", Arial, "WenQuanYi Micro Hei", sans-serif'
    body: '"LXGW WenKai Screen", system-ui, "Microsoft Yahei", "Segoe UI", -apple-system, Roboto, Ubuntu, "Helvetica Neue", Arial, "WenQuanYi Micro Hei", sans-serif'
    code: '"LXGW WenKai Screen", Menlo, Monaco, Consolas, system-ui, "Courier New", monospace, sans-serif'
    codeblock: 'Menlo, Monaco, Consolas, system-ui, "Courier New", monospace, sans-serif'
